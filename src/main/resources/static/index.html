<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Alpha Laser Login System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#020617,#001233,#003566,#2563eb);
            padding:15px;
            overflow-y:auto;
        }

        /* MAIN */

        .container{
            width:100%;
            max-width:1400px;
            margin:auto;
            background:#fff;
            border-radius:30px;
            overflow:hidden;
            display:flex;
            min-height:750px;
            box-shadow:0 25px 60px rgba(0,0,0,0.6);
        }

        /* LEFT */

        .left{
            width:50%;
            background:linear-gradient(135deg,#001845,#003566,#00509d);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            position:relative;
        }

        .left::before{
            content:"";
            position:absolute;
            width:250px;
            height:250px;
            border-radius:50%;
            background:rgba(255,255,255,0.05);
            top:-80px;
            left:-80px;
        }

        .left::after{
            content:"";
            position:absolute;
            width:250px;
            height:250px;
            border-radius:50%;
            background:rgba(255,255,255,0.05);
            bottom:-80px;
            right:-80px;
        }

        .logo{
            text-align:center;
            z-index:5;
        }

        .logo img{
            width:120px;
            background:white;
            padding:10px;
            border-radius:20px;
        }

        .logo h1{
            color:white;
            font-size:52px;
            margin-top:20px;
            font-weight:900;
        }

        .logo h2{
            color:#38bdf8;
            margin-top:10px;
            font-size:26px;
        }

        .machine{
            width:100%;
            display:flex;
            justify-content:center;
            margin-top:40px;
            z-index:5;
        }

        .machine img{
            width:100%;
            max-width:550px;
            border-radius:20px;
        }

        /* RIGHT */

        .right{
            width:50%;
            background:#f8fafc;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .card{
            width:100%;
            max-width:500px;
        }

        .title{
            text-align:center;
            font-size:55px;
            font-weight:900;
            color:#001845;
        }

        .line{
            width:120px;
            height:5px;
            background:#2563eb;
            margin:15px auto 35px auto;
            border-radius:20px;
        }

        /* FORM */

        .input-box{
            margin-bottom:18px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#001845;
        }

        .input-box input{
            width:100%;
            padding:18px;
            border:none;
            border-radius:18px;
            background:#dbeafe;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        .input-box input:focus{
            background:white;
            box-shadow:0 0 15px rgba(37,99,235,0.3);
        }

        .btn{
            width:100%;
            padding:18px;
            border:none;
            border-radius:20px;
            background:linear-gradient(135deg,#0b5cff,#0047ff);
            color:white;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.02);
        }

        .switch{
            text-align:center;
            margin-top:25px;
            font-size:18px;
        }

        .switch span{
            color:#0047ff;
            font-weight:bold;
            cursor:pointer;
        }

        .message{
            margin-top:20px;
            text-align:center;
            font-weight:bold;
            font-size:17px;
        }

        .success{
            color:#16a34a;
        }

        .error{
            color:red;
        }

        .register-field{
            display:none;
        }

        /* MOBILE RESPONSIVE */

        @media(max-width:1000px){

            body{
                padding:10px;
            }

            .container{
                flex-direction:column;
                min-height:auto;
            }

            .left,
            .right{
                width:100%;
            }

            .left{
                padding:25px 15px;
            }

            .right{
                padding:25px 15px;
            }

            .logo h1{
                font-size:34px;
            }

            .logo h2{
                font-size:20px;
            }

            .title{
                font-size:36px;
            }

            .machine img{
                max-width:280px;
            }

            .input-box input{
                padding:15px;
                font-size:14px;
            }

            .btn{
                padding:15px;
                font-size:18px;
            }

            .switch{
                margin-bottom:20px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT -->

    <div class="left">

        <div class="logo">

            <img src="logo.png">

            <h1>ALPHA LASER</h1>

            <h2>SYSTEM</h2>

        </div>

        <div class="machine">

            <img src="machine.png">

        </div>

    </div>

    <!-- RIGHT -->

    <div class="right">

        <div class="card">

            <div class="title" id="formTitle">
                Login
            </div>

            <div class="line"></div>

            <form id="authForm" onsubmit="submitForm(event)">

                <!-- REGISTER -->

                <div class="input-box register-field">
                    <label>Name</label>
                    <input type="text" id="name">
                </div>

                <div class="input-box register-field">
                    <label>Address</label>
                    <input type="text" id="address">
                </div>

                <div class="input-box register-field">
                    <label>Mobile</label>
                    <input type="text" id="mobile">
                </div>

                <div class="input-box register-field">
                    <label>Machine Make</label>
                    <input type="text" id="make">
                </div>

                <div class="input-box register-field">
                    <label>Remarks</label>
                    <input type="text" id="remarks">
                </div>

                <!-- COMMON -->

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn" id="mainBtn">
                    Login
                </button>

            </form>

            <div class="switch">
                <span onclick="toggleForm()" id="switchText">
                    Register
                </span>
            </div>

            <div class="message" id="loginMessage"></div>

        </div>

    </div>

</div>

<script>

    /* AUTO LOGIN */

    const savedToken = localStorage.getItem("token");
    const savedRole = localStorage.getItem("role");

    if(savedToken){

        if(savedRole === "ADMIN" || savedRole === "ROLE_ADMIN"){

            window.location.replace("admin.html");

        }else{

            window.location.replace("user.html");
        }
    }

    /* API */

    const BASE_URL = "https://laser-project-k6tt.onrender.com";

    const LOGIN_API =
    `${BASE_URL}/rajeshroy/auth/login`;

    const REGISTER_API =
    `${BASE_URL}/rajeshroy/auth/register`;

    let isLogin = true;

    /* TOGGLE */

    function toggleForm(){

        isLogin = !isLogin;

        const fields =
        document.querySelectorAll(".register-field");

        const title =
        document.getElementById("formTitle");

        const button =
        document.getElementById("mainBtn");

        const switchText =
        document.getElementById("switchText");

        document.getElementById("authForm").reset();

        document.getElementById("loginMessage").innerHTML = "";

        if(isLogin){

            title.innerHTML = "Login";

            button.innerHTML = "Login";

            switchText.innerHTML = "Register";

            fields.forEach(field=>{
                field.style.display="none";
            });

        }else{

            title.innerHTML = "Register";

            button.innerHTML = "Register";

            switchText.innerHTML = "Back To Login";

            fields.forEach(field=>{
                field.style.display="block";
            });
        }
    }

    /* SUBMIT */

    function submitForm(event){

        event.preventDefault();

        const button =
        document.getElementById("mainBtn");

        const originalText = button.innerHTML;

        button.disabled = true;

        button.innerHTML = "Processing...";

        if(isLogin){

            loginUser(button,originalText);

        }else{

            registerUser(button,originalText);
        }
    }

    /* LOGIN */

    async function loginUser(button,originalText){

        const email =
        document.getElementById("email").value.trim();

        const password =
        document.getElementById("password").value.trim();

        const message =
        document.getElementById("loginMessage");

        try{

            const response = await fetch(LOGIN_API,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email,
                    password
                })
            });

            const data = await response.json();

            if(!response.ok){

                throw new Error(
                    data.message || "Invalid Login"
                );
            }

           localStorage.setItem(
    "token",
    data.token || ""
);

localStorage.setItem(
    "role",
    data.role || ""
);

localStorage.setItem(
    "userId",
    data.id || data.userId || ""
);

console.log(data);

            localStorage.setItem(
                "role",
                data.role || ""
            );

            message.innerHTML =
            "⚡ Login Successful";

            message.className =
            "message success";

            button.disabled = false;

            button.innerHTML = originalText;

            setTimeout(()=>{

                if(
                    data.role === "ADMIN" ||
                    data.role === "ROLE_ADMIN"
                ){

                    window.location.replace(
                        "admin.html"
                    );

                }else{

                    window.location.replace(
                        "user.html"
                    );
                }

            },1000);

        }catch(error){

            message.innerHTML =
            error.message;

            message.className =
            "message error";

            button.disabled = false;

            button.innerHTML = originalText;
        }
    }

    /* REGISTER */

    async function registerUser(button,originalText){

        const body = {

            name:
            document.getElementById("name").value.trim(),

            address:
            document.getElementById("address").value.trim(),

            mobile:
            document.getElementById("mobile").value.trim(),

            make:
            document.getElementById("make").value.trim(),

            remarks:
            document.getElementById("remarks").value.trim(),

            email:
            document.getElementById("email").value.trim(),

            password:
            document.getElementById("password").value.trim()
        };

        const message =
        document.getElementById("loginMessage");

        try{

            const response =
            await fetch(REGISTER_API,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(body)
            });

            const textData =
            await response.text();

            if(!response.ok){

                throw new Error(
                    textData ||
                    "Registration Failed"
                );
            }

            message.innerHTML =
            "⚡ Registration Successful";

            message.className =
            "message success";

            button.disabled = false;

            button.innerHTML = originalText;

            setTimeout(()=>{

                toggleForm();

            },1200);

        }catch(error){

            message.innerHTML =
            error.message;

            message.className =
            "message error";

            button.disabled = false;

            button.innerHTML = originalText;
        }
    }

</script>

</body>
</html>
