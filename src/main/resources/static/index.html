<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ALPHA LASER LOGIN SYSTEM</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
        }

        body{

        min-height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        background:
        linear-gradient(
        135deg,
        #020617,
        #001233,
        #003566,
        #2563eb
        );

        overflow:hidden;

        padding:20px;
        }

        /* CONTAINER */

        .container{

        width:100%;

        max-width:1450px;

        min-height:750px;

        background:white;

        border-radius:35px;

        overflow:hidden;

        display:flex;

        box-shadow:
        0 25px 60px rgba(0,0,0,0.7);
        }

        /* LEFT */

        .left{

        width:55%;

        background:
        linear-gradient(
        135deg,
        #001845,
        #003566,
        #00509d
        );

        display:flex;

        flex-direction:column;

        justify-content:center;

        align-items:center;

        position:relative;

        overflow:hidden;

        padding:40px;
        }

        .left::before{

        content:"";

        position:absolute;

        width:320px;
        height:320px;

        border-radius:50%;

        background:
        rgba(255,255,255,0.06);

        top:-100px;
        left:-100px;
        }

        .left::after{

        content:"";

        position:absolute;

        width:250px;
        height:250px;

        border-radius:50%;

        background:
        rgba(255,255,255,0.05);

        bottom:-80px;
        right:-80px;
        }

        /* DOTS */

        .dots{

        position:absolute;

        width:130px;

        opacity:0.6;
        }

        .dots1{

        top:60px;
        left:40px;
        }

        .dots2{

        bottom:80px;
        right:60px;
        }

        /* LOGO */

        .logo{

        z-index:5;

        text-align:center;
        }

        .logo img{

        width:140px;

        background:white;

        padding:10px;

        border-radius:20px;

        box-shadow:
        0 10px 30px rgba(0,0,0,0.4);
        }

        .logo h1{

        color:white;

        font-size:58px;

        margin-top:20px;

        font-weight:900;

        text-shadow:
        0 5px 15px rgba(0,0,0,0.5);
        }

        .logo h2{

        color:#38bdf8;

        font-size:32px;

        margin-top:10px;

        letter-spacing:4px;
        }

        .tagline{

        margin-top:20px;

        font-size:24px;

        font-weight:600;

        color:white;

        text-shadow:
        0 0 15px rgba(255,255,255,0.3);
        }

        /* MACHINE */

        .machine{

        width:100%;

        display:flex;

        justify-content:center;

        margin-top:40px;

        z-index:5;
        }

        .machine img{

        width:90%;

        max-width:650px;

        border-radius:25px;

        box-shadow:
        0 20px 40px rgba(0,0,0,0.5);
        }

        /* RIGHT */

        .right{

        width:45%;

        background:#f8fafc;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:40px;
        }

        .card{

        width:100%;
        }

        .title{

        text-align:center;

        font-size:60px;

        font-weight:900;

        color:#001845;
        }

        .line{

        width:130px;

        height:5px;

        background:#2563eb;

        margin:15px auto 35px auto;

        border-radius:20px;
        }

        /* INPUT */

        .input-box{

        margin-bottom:18px;
        }

        .input-box label{

        display:block;

        margin-bottom:8px;

        font-size:16px;

        font-weight:bold;

        color:#001845;
        }

        .input-box input{

        width:100%;

        padding:18px;

        border:none;

        border-radius:18px;

        background:
        rgba(219,234,254,0.9);

        backdrop-filter:blur(10px);

        font-size:16px;

        outline:none;

        transition:0.3s;
        }

        .input-box input:focus{

        background:white;

        transform:scale(1.02);

        box-shadow:
        0 0 18px rgba(37,99,235,0.3);
        }

        /* BUTTON */

        .btn{

        width:100%;

        padding:18px;

        border:none;

        border-radius:20px;

        background:
        linear-gradient(
        135deg,
        #0b5cff,
        #0047ff
        );

        color:white;

        font-size:24px;

        font-weight:bold;

        cursor:pointer;

        margin-top:10px;

        transition:0.3s;
        }

        .btn:hover{

        transform:
        translateY(-5px)
        scale(1.02);

        box-shadow:
        0 0 25px rgba(37,99,235,0.6);

        letter-spacing:1px;
        }

        /* SWITCH */

        .switch{

        text-align:center;

        margin-top:25px;

        font-size:18px;
        }

        .switch span{

        color:#0047ff;

        font-weight:bold;

        cursor:pointer;
        }

        /* MESSAGE */

        .message{

        margin-top:18px;

        text-align:center;

        font-size:17px;

        font-weight:bold;
        }

        .success{
        color:#16a34a;
        }

        .error{
        color:red;
        }

        /* REGISTER */

        .register-field{
        display:none;
        }

        /* MOBILE */

        @media(max-width:1100px){

        .container{
        flex-direction:column;
        }

        .left,
        .right{
        width:100%;
        }

        .title{
        font-size:42px;
        }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- LEFT -->

    <div class="left">

        <img src="https://i.ibb.co/Q9yv5Jk/dots.png"
             class="dots dots1">

        <img src="https://i.ibb.co/Q9yv5Jk/dots.png"
             class="dots dots2">

        <div class="logo">

            <img src="logo.png">

            <h1>ALPHA LASER</h1>

            <h2>SYSTEM</h2>

            <p class="tagline">

                Precision • Power • Performance

            </p>

        </div>

        <div class="machine">

            <img src="machine.png">

        </div>

    </div>

    <!-- RIGHT -->

    <div class="right">

        <div class="card">

            <div class="title"
                 id="formTitle">

                Login

            </div>

            <div class="line"></div>

            <form id="authForm"
                  onsubmit="submitForm(event)">

                <!-- REGISTER -->

                <div class="input-box register-field">

                    <label>Name</label>

                    <input type="text"
                           id="name"
                           placeholder="Enter Name">

                </div>

                <div class="input-box register-field">

                    <label>Address</label>

                    <input type="text"
                           id="address"
                           placeholder="Enter Address">

                </div>

                <div class="input-box register-field">

                    <label>Mobile</label>

                    <input type="text"
                           id="mobile"
                           placeholder="Enter Mobile">

                </div>

                <div class="input-box register-field">

                    <label>Machine Make</label>

                    <input type="text"
                           id="make"
                           placeholder="Enter Machine Make">

                </div>

                <div class="input-box register-field">

                    <label>Remarks</label>

                    <input type="text"
                           id="remarks"
                           placeholder="Enter Remarks">

                </div>

                <!-- COMMON -->

                <div class="input-box">

                    <label>Email</label>

                    <input type="email"
                           id="email"
                           placeholder="Enter Email"
                           required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <input type="password"
                           id="password"
                           placeholder="Enter Password"
                           required>

                </div>

                <button type="submit"
                        class="btn"
                        id="mainBtn">

                    Login

                </button>

            </form>

            <div class="switch">

<span onclick="toggleForm()"
      id="switchText">

Register

</span>

            </div>

            <div class="message"
                 id="loginMessage"></div>

        </div>

    </div>

</div>

<script>

    let isLogin = true;

    const BASE_URL =
    "https://laser-project-k6tt.onrender.com";

    const LOGIN_API =
    `${BASE_URL}/rajeshroy/auth/login`;

    const REGISTER_API =
    `${BASE_URL}/rajeshroy/auth/register`;

    /* TOGGLE */

    function toggleForm(){

    isLogin = !isLogin;

    const fields =
    document.querySelectorAll(".register-field");

    const title =
    document.getElementById("formTitle");

    const button =
    document.getElementById("mainBtn");

    const switchText =
    document.getElementById("switchText");

    document.getElementById("authForm").reset();

    document.getElementById("loginMessage").innerHTML = "";

    if(isLogin){

    title.innerHTML = "Login";

    button.innerHTML = "Login";

    switchText.innerHTML = "Register";

    fields.forEach(field => {
    field.style.display = "none";
    });

    }else{

    title.innerHTML = "Register";

    button.innerHTML = "Register";

    switchText.innerHTML = "Back To Login";

    fields.forEach(field => {
    field.style.display = "block";
    });
    }
    }

    /* SUBMIT */

    function submitForm(event){

    event.preventDefault();

    const button =
    document.getElementById("mainBtn");

    const originalText =
    button.innerHTML;

    button.disabled = true;

    button.innerHTML = "Processing...";

    if(isLogin){

    loginUser(button,originalText);

    }else{

    registerUser(button,originalText);
    }
    }

    /* LOGIN */

    async function loginUser(button,originalText){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value.trim();

    const message =
    document.getElementById("loginMessage");

    try{

    const response =
    await fetch(LOGIN_API,{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    email:email,
    password:password
    })
    });

    const data =
    await response.json();

    if(!response.ok){

    throw new Error(
    data.message ||
    "Invalid Email Or Password"
    );
    }

    /* SAVE */

    localStorage.setItem(
    "token",
    data.token || ""
    );

    localStorage.setItem(
    "role",
    data.role || ""
    );

    if(data.id){

    localStorage.setItem(
    "userId",
    data.id
    );
    }

    message.innerHTML =
    "⚡ Login Successful";

    message.className =
    "message success";

    button.disabled = false;

    button.innerHTML = originalText;

    setTimeout(() => {

    if(
    data.role === "ADMIN" ||
    data.role === "ROLE_ADMIN"
    ){

    window.location.href =
    "admin.html";

    }else{

    window.location.href =
    "user.html";
    }

    },1000);

    }catch(error){

    message.innerHTML =
    error.message;

    message.className =
    "message error";

    button.disabled = false;

    button.innerHTML = originalText;
    }
    }

    /* REGISTER */

    async function registerUser(button,originalText){

    const body = {

    name:
    document.getElementById("name").value.trim(),

    address:
    document.getElementById("address").value.trim(),

    mobile:
    document.getElementById("mobile").value.trim(),

    make:
    document.getElementById("make").value.trim(),

    remarks:
    document.getElementById("remarks").value.trim(),

    email:
    document.getElementById("email").value.trim(),

    password:
    document.getElementById("password").value.trim()
    };

    const message =
    document.getElementById("loginMessage");

    try{

    const response =
    await fetch(REGISTER_API,{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify(body)
    });

    const textData =
    await response.text();

    if(!response.ok){

    throw new Error(
    textData ||
    "Registration Failed"
    );
    }

    message.innerHTML =
    "⚡ Registration Successful";

    message.className =
    "message success";

    button.disabled = false;

    button.innerHTML = originalText;

    setTimeout(() => {

    toggleForm();

    },1200);

    }catch(error){

    message.innerHTML =
    error.message;

    message.className =
    "message error";

    button.disabled = false;

    button.innerHTML = originalText;
    }
    }

</script>

</body>

</html>
