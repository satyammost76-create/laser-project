<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Alpha Laser Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            width:100%;
            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #020617,
                #001233,
                #003566,
                #2563eb
            );

            display:flex;

            justify-content:center;

            align-items:center;

            padding:10px;

            overflow-x:hidden;
        }

        /* MAIN */

        .container{

            width:100%;

            max-width:1300px;

            background:white;

            border-radius:25px;

            overflow:hidden;

            display:flex;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.5);
        }

        /* LEFT */

        .left{

            width:50%;

            background:
            linear-gradient(
                135deg,
                #001845,
                #003566,
                #00509d
            );

            padding:30px;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;

            text-align:center;
        }

        .logo{

            width:120px;

            background:white;

            padding:10px;

            border-radius:20px;

            margin-bottom:20px;
        }

        .left h1{

            color:white;

            font-size:50px;

            margin-bottom:10px;
        }

        .left h2{

            color:#38bdf8;

            font-size:24px;

            margin-bottom:30px;

            letter-spacing:3px;
        }

        .machine{

            width:100%;

            max-width:550px;

            border-radius:20px;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.4);
        }

        /* RIGHT */

        .right{

            width:50%;

            background:#f8fafc;

            padding:40px;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        /* CARD */

        .card{

            width:100%;
        }

        .title{

            font-size:48px;

            font-weight:bold;

            color:#001845;

            text-align:center;
        }

        .line{

            width:100px;

            height:5px;

            background:#2563eb;

            margin:15px auto 30px;

            border-radius:10px;
        }

        /* INPUT */

        .input-box{

            margin-bottom:18px;
        }

        .input-box label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#001845;
        }

        .input-box input{

            width:100%;

            padding:16px;

            border:none;

            border-radius:14px;

            background:#dbeafe;

            font-size:15px;

            outline:none;
        }

        .input-box input:focus{

            background:white;

            box-shadow:
            0 0 10px rgba(37,99,235,0.3);
        }

        /* BUTTON */

        .btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #0b5cff,
                #0047ff
            );

            color:white;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{

            transform:translateY(-2px);

            box-shadow:
            0 10px 20px rgba(37,99,235,0.4);
        }

        /* SWITCH */

        .switch{

            margin-top:20px;

            text-align:center;

            font-size:16px;
        }

        .switch span{

            color:#0047ff;

            font-weight:bold;

            cursor:pointer;
        }

        /* MESSAGE */

        .message{

            margin-top:15px;

            text-align:center;

            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        /* REGISTER */

        .register-field{
            display:none;
        }

        /* MOBILE */

        @media(max-width:900px){

            body{

                padding:5px;

                align-items:flex-start;
            }

            .container{

                flex-direction:column;

                border-radius:18px;
            }

            .left,
            .right{

                width:100%;
            }

            .left{

                padding:20px 15px;
            }

            .logo{

                width:80px;
            }

            .left h1{

                font-size:30px;
            }

            .left h2{

                font-size:16px;

                margin-bottom:20px;
            }

            .machine{

                max-width:100%;

                max-height:220px;

                object-fit:cover;
            }

            .right{

                padding:20px 15px;
            }

            .title{

                font-size:30px;
            }

            .line{

                width:70px;

                margin-bottom:20px;
            }

            .input-box{

                margin-bottom:14px;
            }

            .input-box input{

                padding:13px;

                font-size:14px;
            }

            .btn{

                padding:14px;

                font-size:16px;
            }

            .switch{

                font-size:14px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- LEFT -->

    <div class="left">

        <img src="logo.png"
             class="logo">

        <h1>ALPHA LASER</h1>

        <h2>SYSTEM</h2>

        <img src="machine.png"
             class="machine">

    </div>

    <!-- RIGHT -->

    <div class="right">

        <div class="card">

            <div class="title"
                 id="formTitle">

                Login

            </div>

            <div class="line"></div>

            <form id="authForm"
                  onsubmit="submitForm(event)">

                <!-- REGISTER -->

                <div class="input-box register-field">

                    <label>Name</label>

                    <input type="text"
                           id="name"
                           placeholder="Enter Name">

                </div>

                <div class="input-box register-field">

                    <label>Address</label>

                    <input type="text"
                           id="address"
                           placeholder="Enter Address">

                </div>

                <div class="input-box register-field">

                    <label>Mobile</label>

                    <input type="text"
                           id="mobile"
                           placeholder="Enter Mobile">

                </div>

                <div class="input-box register-field">

                    <label>Machine Make</label>

                    <input type="text"
                           id="make"
                           placeholder="Enter Machine Make">

                </div>

                <div class="input-box register-field">

                    <label>Remarks</label>

                    <input type="text"
                           id="remarks"
                           placeholder="Enter Remarks">

                </div>

                <!-- COMMON -->

                <div class="input-box">

                    <label>Email</label>

                    <input type="email"
                           id="email"
                           placeholder="Enter Email"
                           required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <input type="password"
                           id="password"
                           placeholder="Enter Password"
                           required>

                </div>

                <button type="submit"
                        class="btn"
                        id="mainBtn">

                    Login

                </button>

            </form>

            <div class="switch">

                <span onclick="toggleForm()"
                      id="switchText">

                    Register

                </span>

            </div>

            <div class="message"
                 id="loginMessage"></div>

        </div>

    </div>

</div>

<script>

    let isLogin = true;

    const BASE_URL =
    "https://laser-project-k6tt.onrender.com";

    const LOGIN_API =
    `${BASE_URL}/rajeshroy/auth/login`;

    const REGISTER_API =
    `${BASE_URL}/rajeshroy/auth/register`;

    /* TOGGLE */

    function toggleForm(){

        isLogin = !isLogin;

        const fields =
        document.querySelectorAll(".register-field");

        const title =
        document.getElementById("formTitle");

        const button =
        document.getElementById("mainBtn");

        const switchText =
        document.getElementById("switchText");

        document.getElementById("authForm").reset();

        document.getElementById("loginMessage").innerHTML = "";

        if(isLogin){

            title.innerHTML = "Login";

            button.innerHTML = "Login";

            switchText.innerHTML = "Register";

            fields.forEach(field => {

                field.style.display = "none";
            });

        }

        else{

            title.innerHTML = "Register";

            button.innerHTML = "Register";

            switchText.innerHTML = "Back To Login";

            fields.forEach(field => {

                field.style.display = "block";
            });
        }
    }

    /* SUBMIT */

    function submitForm(event){

        event.preventDefault();

        const button =
        document.getElementById("mainBtn");

        const originalText =
        button.innerHTML;

        button.disabled = true;

        button.innerHTML = "Processing...";

        if(isLogin){

            loginUser(button,originalText);

        }

        else{

            registerUser(button,originalText);
        }
    }

    /* LOGIN */

    async function loginUser(button,originalText){

        const email =
        document.getElementById("email").value.trim();

        const password =
        document.getElementById("password").value.trim();

        const message =
        document.getElementById("loginMessage");

        try{

            const response =
            await fetch(LOGIN_API,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email,
                    password:password
                })
            });

            const data =
            await response.json();

            if(!response.ok){

                throw new Error(
                    data.message ||
                    "Invalid Email Or Password"
                );
            }

            localStorage.setItem(
                "token",
                data.token || ""
            );

            localStorage.setItem(
                "role",
                data.role || ""
            );

            message.innerHTML =
            "⚡ Login Successful";

            message.className =
            "message success";

            button.disabled = false;

            button.innerHTML = originalText;

            setTimeout(() => {

                if(
                    data.role === "ADMIN" ||
                    data.role === "ROLE_ADMIN"
                ){

                    window.location.href =
                    "admin.html";
                }

                else{

                    window.location.href =
                    "user.html";
                }

            },1000);

        }

        catch(error){

            message.innerHTML =
            error.message;

            message.className =
            "message error";

            button.disabled = false;

            button.innerHTML = originalText;
        }
    }

    /* REGISTER */

    async function registerUser(button,originalText){

        const body = {

            name:
            document.getElementById("name").value.trim(),

            address:
            document.getElementById("address").value.trim(),

            mobile:
            document.getElementById("mobile").value.trim(),

            make:
            document.getElementById("make").value.trim(),

            remarks:
            document.getElementById("remarks").value.trim(),

            email:
            document.getElementById("email").value.trim(),

            password:
            document.getElementById("password").value.trim()
        };

        const message =
        document.getElementById("loginMessage");

        try{

            const response =
            await fetch(REGISTER_API,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(body)
            });

            const textData =
            await response.text();

            if(!response.ok){

                throw new Error(
                    textData ||
                    "Registration Failed"
                );
            }

            message.innerHTML =
            "⚡ Registration Successful";

            message.className =
            "message success";

            button.disabled = false;

            button.innerHTML = originalText;

            setTimeout(() => {

                toggleForm();

            },1200);

        }

        catch(error){

            message.innerHTML =
            error.message;

            message.className =
            "message error";

            button.disabled = false;

            button.innerHTML = originalText;
        }
    }

</script>

</body>
</html>
