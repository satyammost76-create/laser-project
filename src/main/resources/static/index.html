<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Alpha Laser Login & Register</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
          font-family:Arial, Helvetica, sans-serif;
        }

        body{
          min-height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          background:
          linear-gradient(
            135deg,
            #020617,
            #001233,
            #003566,
            #2563eb
          );
          padding:15px;
          overflow-x:hidden;
        }

        .container{
          width:100%;
          max-width:1450px;
          min-height:760px;
          background:white;
          border-radius:35px;
          overflow:hidden;
          display:flex;
          box-shadow:
          0px 25px 70px rgba(0,0,0,0.7);
          backdrop-filter:blur(15px);
        }

        .left{
          width:55%;
          background:
          linear-gradient(
            135deg,
            #001133,
            #002966,
            #0055ff
          );
          position:relative;
          display:flex;
          flex-direction:column;
          align-items:center;
          overflow:hidden;
          padding:40px 20px;
        }

        .circle1,
        .circle2{
          position:absolute;
          border-radius:50%;
          background:
          rgba(0,0,0,0.15);
        }

        .circle1{
          width:250px;
          height:250px;
          top:-100px;
          left:-100px;
        }

        .circle2{
          width:220px;
          height:220px;
          bottom:-100px;
          left:-100px;
        }

        .dots,
        .dots2{
          position:absolute;
          width:120px;
          height:120px;
          background-image:
          radial-gradient(
            #38bdf8 2px,
            transparent 2px
          );
          background-size:16px 16px;
        }

        .dots{
          top:35px;
          left:20px;
        }

        .dots2{
          right:35px;
          bottom:70px;
          width:140px;
          height:140px;
        }

        .logo{
          z-index:5;
        }

        .logo img{
          width:140px;
          background:white;
          padding:8px;
          border-radius:12px;
          box-shadow:
          0px 8px 20px rgba(0,0,0,0.4);
        }

        .title{
          margin-top:15px;
          text-align:center;
          z-index:5;
        }

        .title h1{
          color:white;
          font-size:46px;
          font-weight:900;
          text-shadow:
          0px 5px 10px rgba(0,0,0,0.6);
        }

        .system-row{
          display:flex;
          align-items:center;
          justify-content:center;
          gap:14px;
          margin-top:8px;
        }

        .line{
          width:70px;
          height:4px;
          background:#00bfff;
          border-radius:20px;
          box-shadow:
          0px 0px 15px #00bfff;
        }

        .system{
          color:#00bfff;
          font-size:28px;
          font-weight:900;
        }

        .subtext{
          margin-top:8px;
          color:white;
          font-size:22px;
          font-weight:bold;
          letter-spacing:1px;
          z-index:5;
        }

        .machine-box{
          width:100%;
          flex-grow:1;
          display:flex;
          justify-content:center;
          align-items:center;
          position:relative;
          margin-top:30px;
          z-index:5;
        }

        .machine-box img{
          width:270px;
          max-width:95%;
          object-fit:contain;
          border-radius:15px;
          filter:
          drop-shadow(
            0px 14px 28px rgba(0,0,0,0.7)
          );
        }

        .glow{
          position:absolute;
          width:180px;
          height:35px;
          background:
          radial-gradient(
            circle,
            #00bfff,
            transparent
          );
          left:50%;
          bottom:10px;
          transform:translateX(-50%);
          filter:blur(12px);
        }

        .right{
          width:45%;
          background:#f8fafc;
          display:flex;
          justify-content:center;
          align-items:center;
          padding:35px;
        }

        .login-card{
          width:100%;
          animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
          from{
            opacity:0;
            transform:
            translateY(20px);
          }
          to{
            opacity:1;
            transform:
            translateY(0);
          }
        }

        .login-title{
          text-align:center;
          font-size:55px;
          font-weight:900;
          color:#001845;
        }

        .small-line{
          width:100px;
          height:5px;
          background:#2563eb;
          margin:10px auto 28px auto;
          border-radius:20px;
        }

        .input-box{
          margin-bottom:15px;
        }

        .input-box label{
          display:block;
          margin-bottom:6px;
          font-size:17px;
          font-weight:bold;
          color:#001845;
        }

        .input-box input{
          width:100%;
          padding:16px;
          border:none;
          border-radius:15px;
          background:#dbe7f5;
          outline:none;
          font-size:15px;
          transition:0.3s;
        }

        .input-box input:focus{
          transform:scale(1.02);
          background:#ffffff;
          box-shadow:
          0px 0px 15px rgba(37,99,235,0.4);
        }

        .btn{
          width:100%;
          padding:16px;
          border:none;
          border-radius:18px;
          background:
          linear-gradient(
            90deg,
            #0b5cff,
            #0047ff
          );
          color:white;
          font-size:26px;
          font-weight:bold;
          cursor:pointer;
          margin-top:8px;
          transition:0.3s;
          position:relative;
          overflow:hidden;
        }

        .btn:hover{
          transform:translateY(-3px);
          box-shadow:
          0px 15px 25px rgba(37,99,235,0.4);
        }

        .switch{
          margin-top:20px;
          text-align:center;
          font-size:17px;
        }

        .switch span{
          color:#0047ff;
          font-weight:bold;
          cursor:pointer;
        }

        .message{
          margin-top:15px;
          text-align:center;
          font-size:16px;
          font-weight:bold;
        }

        .success{
          color:#16a34a;
        }

        .error{
          color:red;
        }

        @media(max-width:1100px){

          .container{
            flex-direction:column;
          }

          .left,
          .right{
            width:100%;
          }

          .login-title{
            font-size:42px;
          }
        }

    </style>

</head>

<body>

<div class="container">

    <div class="left">

        <div class="circle1"></div>
        <div class="circle2"></div>
        <div class="dots"></div>
        <div class="dots2"></div>

        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="title">
            <h1>ALPHA LASER</h1>
        </div>

        <div class="system-row">
            <div class="line"></div>
            <div class="system">SYSTEM</div>
            <div class="line"></div>
        </div>

        <div class="subtext">
            Precision • Power • Performance
        </div>

        <div class="machine-box">
            <img src="machine.png" alt="Machine">
            <div class="glow"></div>
        </div>

    </div>

    <div class="right">

        <div class="login-card">

            <div class="login-title" id="formTitle">
                Login
            </div>

            <div class="small-line"></div>

            <form id="authForm" onsubmit="submitForm(event)">

                <div class="input-box register-field" style="display:none;">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Enter Name">
                </div>

                <div class="input-box register-field" style="display:none;">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter Address">
                </div>

                <div class="input-box register-field" style="display:none;">
                    <label>Mobile</label>
                    <input type="text" id="mobile" placeholder="Enter Mobile">
                </div>

                <div class="input-box register-field" style="display:none;">
                    <label>Machine Make</label>
                    <input type="text" id="make" placeholder="Enter Machine Make">
                </div>

                <div class="input-box register-field" style="display:none;">
                    <label>Remarks</label>
                    <input type="text" id="remarks" placeholder="Enter Remarks">
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter Email" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>

                <button type="submit" class="btn" id="mainBtn">
                    Login
                </button>

            </form>

            <div class="switch">
          <span onclick="toggleForm()" id="switchText">
            Register
          </span>
            </div>

            <div class="message" id="loginMessage"></div>

        </div>

    </div>

</div>

<script>

    let isLogin = true;

    const BASE_URL =
    "https://laser-project-k6tt.onrender.com";

    const LOGIN_API =
    `${BASE_URL}/rajeshroy/auth/login`;

    const REGISTER_API =
    `${BASE_URL}/rajeshroy/auth/register`;

    function toggleForm(){

      isLogin = !isLogin;

      const fields =
      document.querySelectorAll(".register-field");

      const inputs =
      document.querySelectorAll(".register-field input");

      document.getElementById("authForm").reset();

      document.getElementById("loginMessage").innerHTML = "";

      if(isLogin){

        document.getElementById("formTitle").innerHTML = "Login";

        document.getElementById("mainBtn").innerHTML = "Login";

        document.getElementById("switchText").innerHTML = "Register";

        fields.forEach(field => {
          field.style.display = "none";
        });

        inputs.forEach(input => {
          input.removeAttribute("required");
        });

      } else {

        document.getElementById("formTitle").innerHTML = "Register";

        document.getElementById("mainBtn").innerHTML = "Register";

        document.getElementById("switchText").innerHTML = "Back To Login";

        fields.forEach(field => {
          field.style.display = "block";
        });

        inputs.forEach(input => {
          input.setAttribute("required","true");
        });
      }
    }

    function submitForm(event){

      event.preventDefault();

      const button =
      document.getElementById("mainBtn");

      const originalText =
      button.innerHTML;

      button.disabled = true;

      button.innerHTML = "Processing...";

      if(isLogin){
        loginUser(button,originalText);
      } else {
        registerUser(button,originalText);
      }
    }

    function loginUser(button,originalText){

      const email =
      document.getElementById("email").value.trim();

      const password =
      document.getElementById("password").value.trim();

      const message =
      document.getElementById("loginMessage");

      fetch(LOGIN_API,{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          email:email,
          password:password
        })

      })

      .then(async response => {

        const data = await response.json();

        if(!response.ok){

          throw new Error(
            data.message ||
            "Invalid Email or Password"
          );
        }

        return data;
      })

      .then(data => {

        localStorage.setItem(
          "token",
          data.token || ""
        );

        localStorage.setItem(
          "role",
          data.role || ""
        );

        message.innerHTML =
        "⚡ Login Successful!";

        message.className =
        "message success";

        button.disabled = false;

        button.innerHTML = originalText;

        setTimeout(() => {

          if(
            data.role === "ADMIN" ||
            data.role === "ROLE_ADMIN"
          ){

            window.location.href =
            "admin.html";

          } else {

            window.location.href =
            "user.html";
          }

        },1000);

      })

      .catch(error => {

        message.innerHTML =
        error.message;

        message.className =
        "message error";

        button.disabled = false;

        button.innerHTML = originalText;

      });
    }

    function registerUser(button,originalText){

      const body = {

        name:
        document.getElementById("name").value.trim(),

        address:
        document.getElementById("address").value.trim(),

        mobile:
        document.getElementById("mobile").value.trim(),

        make:
        document.getElementById("make").value.trim(),

        remarks:
        document.getElementById("remarks").value.trim(),

        email:
        document.getElementById("email").value.trim(),

        password:
        document.getElementById("password").value.trim()
      };

      const message =
      document.getElementById("loginMessage");

      fetch(REGISTER_API,{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify(body)

      })

      .then(async response => {

        const textData =
        await response.text();

        if(!response.ok){

          throw new Error(
            textData ||
            "Registration Failed"
          );
        }

        return textData;

      })

      .then(() => {

        message.innerHTML =
        "⚡ Registration Successful!";

        message.className =
        "message success";

        button.disabled = false;

        button.innerHTML = originalText;

        setTimeout(() => {
          toggleForm();
        },1200);

      })

      .catch(error => {

        message.innerHTML =
        error.message;

        message.className =
        "message error";

        button.disabled = false;

        button.innerHTML = originalText;

      });
    }

</script>

</body>

</html>
